# Tower family catalogue — LLM-based scoring via GEMBA-DA / GEMBA-MQM /
# Tower-native prompts. Every entry is a `family: tower` scorer that the
# runner builds through the vLLM (default) or transformers backend.
#
# Source papers:
#   Alves et al. 2024 (Tower)                      — arXiv:2402.17733
#   Kocmi & Federmann 2023 (GEMBA-DA, GEMBA-MQM)   — EAMT 2023
#   Pombal et al. 2025 (Tower-Plus)                — Unbabel blog/report
#
# Default prompt_mode is gemba-da (single-float score, max_tokens=50,
# temperature=0.0). Switch to gemba-mqm for MQM-weighted scoring.
#
# Tensor parallelism (`tensor_parallel_size`) is auto-picked by the scorer
# based on model size; override via overrides in the run config if needed.
#
# VRAM sizing (fp16):
#   7B  ≈ 14 GB   — tp=1 fits anywhere
#   9B  ≈ 18 GB   — tp=1 fits on 48 GB+ cards (L40s, A6000, A100)
#   13B ≈ 26 GB   — tp=1 fits on 48 GB+ cards
#   72B ≈ 144 GB  — tp=4 on A100 80GB; tp=2 won't fit
# Keep tp minimal: process-global vLLM distributed state persists across
# scorer loads (see TowerScorer.unload() + tests/test_scorers_tower_unload.py),
# and every tp>1 load pins the process into that regime.
#
# All Tower models are CC-BY-NC-4.0 — research use only.

family: tower

models:

  # --- Base models (pre-instruction-tuning) ---------------------------
  towerbase-7b-v0.1:
    model: Unbabel/TowerBase-7B-v0.1
    notes: "Tower Base 7B, Llama-2 backbone. Not instruction-tuned — expect lower parse_ok."
    params:
      prompt_mode: gemba-da
      backend: vllm
      temperature: 0.0
      top_p: 1.0
      max_tokens: 50
      tensor_parallel_size: 1

  towerbase-13b-v0.1:
    model: Unbabel/TowerBase-13B-v0.1
    notes: "Tower Base 13B. 26 GB fp16 — fits tp=1 on A100 80GB / L40s 48GB."
    params:
      prompt_mode: gemba-da
      backend: vllm
      temperature: 0.0
      max_tokens: 50
      tensor_parallel_size: 1

  # --- Instruction-tuned (TowerInstruct) -----------------------------
  towerinstruct-7b-v0.1:
    model: Unbabel/TowerInstruct-7B-v0.1
    notes: "First instruction-tuned Tower (Jan 2024)."
    params:
      prompt_mode: gemba-da
      backend: vllm
      temperature: 0.0
      max_tokens: 50
      tensor_parallel_size: 1

  towerinstruct-7b-v0.2:
    model: Unbabel/TowerInstruct-7B-v0.2
    notes: "Tower Instruct 7B v0.2 (Feb 2024) — recommended 7B default."
    params:
      prompt_mode: gemba-da
      backend: vllm
      temperature: 0.0
      max_tokens: 50
      tensor_parallel_size: 1

  towerinstruct-13b-v0.1:
    model: Unbabel/TowerInstruct-13B-v0.1
    notes: "Tower Instruct 13B (Jan 2024). 26 GB fp16 — tp=1 on A100 80GB / L40s 48GB."
    params:
      prompt_mode: gemba-da
      backend: vllm
      temperature: 0.0
      max_tokens: 50
      tensor_parallel_size: 1

  towerinstruct-mistral-7b-v0.2:
    model: Unbabel/TowerInstruct-Mistral-7B-v0.2
    notes: |
      Mistral-backbone Tower Instruct (Mar 2024). Runs on the HF
      transformers backend rather than vLLM — vLLM 0.6.3's Llama path
      crashes at LlamaAttention.__init__ (llama.py:134):

          self.q_size = self.num_heads * self.head_dim
          TypeError: unsupported operand type(s) for *: 'int' and 'NoneType'

      because Mistral's HF config omits ``head_dim`` and vLLM reads it
      raw rather than deriving hidden_size // num_heads. Neither
      ``disable_sliding_window`` nor a ``max_model_len`` pin touches
      this call site — both were tried 2026-04-21/22 on AISURREY (jobs
      2108138-series and 2108721-series) and both failed at the same
      traceback. Upgrading past vLLM 0.6.x is blocked by our torch
      2.4.0 pin. Mistral-7B fp16 ≈ 14 GB fits single-GPU on any 24 GB+
      card via HF pipeline with device_map=auto.

      Slower than vLLM-backed Tower peers (rough order-of-magnitude:
      ~30 min/domain at batch_size=8 vs ~5 min for vLLM). Acceptable
      for a single scorer; revisit if a vLLM upgrade unblocks us.
    params:
      prompt_mode: gemba-da
      backend: transformers
      temperature: 0.0
      max_tokens: 50
      batch_size: 8

  towerinstruct-wmt24-chat-7b:
    model: Unbabel/TowerInstruct-WMT24-Chat-7B
    notes: "WMT24-specific Tower variant."
    params:
      prompt_mode: gemba-da
      backend: vllm
      temperature: 0.0
      max_tokens: 50
      tensor_parallel_size: 1

  # --- Tower-Plus (2025) ---------------------------------------------
  tower-plus-2b:
    model: Unbabel/Tower-Plus-2B
    notes: "Tower-Plus 2B (Gemma2 backbone). Smallest — good for smoke tests."
    params:
      prompt_mode: gemba-da
      backend: vllm
      temperature: 0.0
      max_tokens: 50
      tensor_parallel_size: 1

  tower-plus-9b:
    model: Unbabel/Tower-Plus-9B
    notes: "Tower-Plus 9B (Gemma2 backbone). Recommended general default. 18 GB fp16 — tp=1 anywhere 24 GB+."
    params:
      prompt_mode: gemba-da
      backend: vllm
      temperature: 0.0
      max_tokens: 50
      tensor_parallel_size: 1

  tower-plus-72b:
    model: Unbabel/Tower-Plus-72B
    notes: |
      Tower-Plus 72B (Qwen2 backbone). 144 GB fp16 — genuinely needs tp=4
      on A100 80GB. On AISURREY this means `--gres=gpu:4 -p a100` with
      real queue time; runs submitted on `gpu:1` will be skipped by the
      runner ("required GPUs exceeds placement group size"). Use a
      72b-only run config when the queue opens.
    params:
      prompt_mode: gemba-da
      backend: vllm
      temperature: 0.0
      max_tokens: 50
      tensor_parallel_size: 4

  # --- GEMBA-MQM aliases ---------------------------------------------
  # Same models with MQM prompting. Handy when you want both in one run —
  # reference them as `tower/towerinstruct-7b-v0.2-mqm` etc.

  towerinstruct-7b-v0.2-mqm:
    model: Unbabel/TowerInstruct-7B-v0.2
    notes: "7B with GEMBA-MQM prompt (longer output, richer extras)."
    params:
      prompt_mode: gemba-mqm
      backend: vllm
      temperature: 0.0
      max_tokens: 384
      tensor_parallel_size: 1

  towerinstruct-13b-v0.1-mqm:
    model: Unbabel/TowerInstruct-13B-v0.1
    notes: "13B with GEMBA-MQM prompt. tp=1 (fits 48GB+ at 26 GB fp16)."
    params:
      prompt_mode: gemba-mqm
      backend: vllm
      temperature: 0.0
      max_tokens: 384
      tensor_parallel_size: 1

  tower-plus-9b-mqm:
    model: Unbabel/Tower-Plus-9B
    notes: "Tower-Plus 9B with GEMBA-MQM prompt. tp=1 (18 GB fp16)."
    params:
      prompt_mode: gemba-mqm
      backend: vllm
      temperature: 0.0
      max_tokens: 384
      tensor_parallel_size: 1

  tower-plus-72b-mqm:
    model: Unbabel/Tower-Plus-72B
    notes: "Tower-Plus 72B with GEMBA-MQM prompt. Needs gpu:4 — see tower-plus-72b note."
    params:
      prompt_mode: gemba-mqm
      backend: vllm
      temperature: 0.0
      max_tokens: 384
      tensor_parallel_size: 4

  # --- Tower-native (chat template) ----------------------------------
  towerinstruct-7b-v0.2-native:
    model: Unbabel/TowerInstruct-7B-v0.2
    notes: "Tower-native prompt (system+user chat framing)."
    params:
      prompt_mode: tower-native
      backend: vllm
      temperature: 0.0
      max_tokens: 50
      tensor_parallel_size: 1
