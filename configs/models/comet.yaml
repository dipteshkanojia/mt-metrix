# COMET family catalogue — one entry per Unbabel checkpoint.
#
# Parameter defaults follow the COMET paper series:
#   Rei et al. 2020 (COMET)             — arXiv:2009.09025
#   Rei et al. 2022 (COMET-22, Kiwi-22) — arXiv:2204.12463, 2209.06243
#   Rei et al. 2023 (Kiwi-23 XL/XXL)    — arXiv:2306.11925
#   Guerreiro et al. 2023 (XCOMET)      — arXiv:2310.10482
#
# `needs_reference: true` → reference-based; skip when dataset has no refs.
# `needs_reference: false` → QE mode (Kiwi, XCOMET QE).
#
# XL/XXL models are GATED on HuggingFace — accept the licence on each model's
# web page and set $HF_TOKEN (see docs/AISURREY.md).

family: comet

models:

  # --- Reference-based DA (comet-da) ------------------------------------
  wmt22-comet-da:
    model: Unbabel/wmt22-comet-da
    needs_reference: true
    notes: "WMT22 SOTA DA metric, XLM-R-large backbone."
    params:
      batch_size: 64
      gpus: 1
      num_workers: 2
      progress_bar: true

  eamt22-cometinho-da:
    model: Unbabel/eamt22-cometinho-da
    needs_reference: true
    notes: "Lightweight distilled COMET (EAMT 2022)."
    params:
      batch_size: 128
      gpus: 1
      num_workers: 2
      progress_bar: true

  wmt20-comet-da:
    model: Unbabel/wmt20-comet-da
    needs_reference: true
    notes: "Historical WMT20 DA baseline."
    params:
      batch_size: 64
      gpus: 1

  wmt21-comet-da:
    model: Unbabel/wmt21-comet-da-marian
    needs_reference: true
    notes: |
      WMT21 DA (Marian port of the original checkpoint).
      BROKEN with modern unbabel-comet (2026-04-20 diagnosis): the HF repo
      ships weights as `checkpoints/marian.model.bin`, but unbabel-comet's
      `download_model()` hardcodes `checkpoints/model.ckpt` as the return
      path, so `load_from_checkpoint()` raises `Invalid checkpoint path`.
      Applies to ALL three `-marian` checkpoints (this one + the two QE
      variants below). Do NOT include in full-matrix runs until upstream
      grows a Marian loader.
    params:
      batch_size: 64
      gpus: 1

  # --- Reference-free QE (comet-qe / cometkiwi) -------------------------
  wmt22-cometkiwi-da:
    model: Unbabel/wmt22-cometkiwi-da
    needs_reference: false
    notes: "CometKiwi (WMT22) — reference-free, InfoXLM-large. Gated."
    params:
      batch_size: 64
      gpus: 1
      num_workers: 2
      progress_bar: true

  wmt23-cometkiwi-da-xl:
    model: Unbabel/wmt23-cometkiwi-da-xl
    needs_reference: false
    notes: "CometKiwi-XL (WMT23) — XLM-R-XL 3.5B. Gated."
    params:
      batch_size: 16
      gpus: 1
      num_workers: 2
      progress_bar: true

  wmt23-cometkiwi-da-xxl:
    model: Unbabel/wmt23-cometkiwi-da-xxl
    needs_reference: false
    notes: "CometKiwi-XXL (WMT23) — XLM-R-XXL 10.7B. Gated."
    params:
      batch_size: 8
      gpus: 1
      num_workers: 2
      progress_bar: true

  wmt20-comet-qe-da:
    model: Unbabel/wmt20-comet-qe-da
    needs_reference: false
    notes: "Historical QE baseline (WMT20)."
    params:
      batch_size: 64
      gpus: 1

  wmt21-comet-qe-da:
    model: Unbabel/wmt21-comet-qe-da-marian
    needs_reference: false
    notes: |
      WMT21 QE (Marian). BROKEN — same Marian filename mismatch as
      `wmt21-comet-da` above: repo has `checkpoints/marian.model.bin`,
      `download_model()` hardcodes `checkpoints/model.ckpt`. The earlier
      2026-04-19 run appeared to "load fine" only because Bug B silently
      skipped it as ref-needing on QE-only datasets — once that resolver
      bug was fixed, this one started failing loudly with
      `Invalid checkpoint path`. Do NOT include in full-matrix runs.
    params:
      batch_size: 64
      gpus: 1

  wmt21-comet-qe-mqm:
    model: Unbabel/wmt21-comet-qe-mqm-marian
    needs_reference: false
    notes: |
      WMT21 QE trained on MQM (Marian). BROKEN — same Marian filename
      mismatch as the other two `-marian` entries above.

      Root cause (2026-04-20): the HF repo is apache-2.0, NOT gated
      (verified via `hf_hub_query`). The failure is one level down:
      `snapshot_download` pulls `checkpoints/marian.model.bin` +
      `.md5` + LICENSE + README, but unbabel-comet's `download_model()`
      then returns `<snapshot>/checkpoints/model.ckpt` unconditionally
      (`comet/models/__init__.py`), and `load_from_checkpoint()` raises
      `Invalid checkpoint path` because that file does not exist.

      This was the only Marian QE that visibly failed in the 2026-04-19
      full-matrix run because Bug B had silently skipped the other QE
      Marian (`wmt21-comet-qe-da`) before it could try to load. Now that
      Bug B is fixed, both would fail identically — both are removed
      from the full-matrix configs. Do NOT include in full-matrix runs.
    params:
      batch_size: 64
      gpus: 1

  # --- Explainable (XCOMET) --------------------------------------------
  xcomet-xl:
    model: Unbabel/XCOMET-XL
    needs_reference: true
    notes: "XCOMET-XL — explainable reference-based metric. Returns error spans. Gated."
    params:
      batch_size: 16
      gpus: 1
      num_workers: 2
      progress_bar: true
      output_seg_err_spans: true

  xcomet-xxl:
    model: Unbabel/XCOMET-XXL
    needs_reference: true
    notes: "XCOMET-XXL — explainable reference-based metric. Gated."
    params:
      batch_size: 8
      gpus: 1
      num_workers: 2
      progress_bar: true
      output_seg_err_spans: true

  # --- QE-mode XCOMET (pass reference=None) ----------------------------
  # XCOMET in QE-mode: same checkpoint, ref is omitted. We expose this as
  # a separate ref so users can pick it explicitly.
  xcomet-xl-qe:
    model: Unbabel/XCOMET-XL
    needs_reference: false
    notes: "XCOMET-XL in QE mode (no reference)."
    params:
      batch_size: 16
      gpus: 1
      num_workers: 2
      progress_bar: true
      output_seg_err_spans: true

  xcomet-xxl-qe:
    model: Unbabel/XCOMET-XXL
    needs_reference: false
    notes: "XCOMET-XXL in QE mode (no reference)."
    params:
      batch_size: 8
      gpus: 1
      num_workers: 2
      progress_bar: true
      output_seg_err_spans: true
