# surrey-nlp/health-QE — domain-specific QE for Indic health-domain translations.
# Subsets (verified via HF parquet API 2026-04): en-gujarati, en-hindi,
# en-marathi, en-tamil.
# https://hf.co/datasets/surrey-nlp/health-QE

kind: huggingface
repo: surrey-nlp/health-QE
# Load all four language subsets and concatenate. Per-row `language_pair`
# column keeps the pairs separable for the tabulate command's pivot.
configs: [en-gujarati, en-hindi, en-marathi, en-tamil]
split: test
domain: health
columns:
  source: source_text
  target: target_text
  gold: z_mean
  lang_pair: "@from:language_pair"
  domain: "@constant:health"
