kind: huggingface
repo: surrey-nlp/Legal-QE
# config: en-gujarati     # pick a subset; leave unset for the default config
split: test
domain: legal
columns:
  source: source_text
  target: target_text
  gold: z_mean
  lang_pair: "@from:language_pair"
  domain: "@constant:legal"
