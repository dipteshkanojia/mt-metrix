# surrey-nlp/Legal-QE — domain-specific QE for Indic legal translations.
# Lang pairs: en-gu, en-ta, en-te. Licence: AFL-3.0.
# https://hf.co/datasets/surrey-nlp/Legal-QE

kind: huggingface
repo: surrey-nlp/Legal-QE
# Legal-QE has NO default config — you must pick a language subset.
# Available: en-gujarati, en-tamil, en-telugu. For per-language runs,
# clone this file and switch `config:` rather than editing in place.
config: en-gujarati
split: test
domain: legal
columns:
  source: source_text
  target: target_text
  gold: z_mean
  lang_pair: "@from:language_pair"
  domain: "@constant:legal"
