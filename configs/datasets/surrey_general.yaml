# surrey-nlp/General-QE — domain-specific QE for Indic general-domain translations.
# Subsets (verified via HF parquet API 2026-04): en-gujarati, en-hindi,
# en-marathi, en-tamil, en-telugu.
# https://hf.co/datasets/surrey-nlp/General-QE
#
# Known data quirks (see gyroQE/data/raw/HUGGINGFACE_DATASETS.md):
#   - en-Marathi: missing `mean` column, uses space-separated scores.
#     Prefer `z_mean` (present) as the gold target.

kind: huggingface
repo: surrey-nlp/General-QE
# Load all five language subsets and concatenate. Per-row `language_pair`
# column keeps the pairs separable for the tabulate command's pivot.
configs: [en-gujarati, en-hindi, en-marathi, en-tamil, en-telugu]
split: test
domain: general
columns:
  source: source_text
  target: target_text
  gold: z_mean
  lang_pair: "@from:language_pair"
  domain: "@constant:general"
