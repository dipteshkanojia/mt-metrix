# Surrey Legal-QE — Tower-Plus-72B-only follow-up.
#
# Why a separate config:
#   Tower-Plus-72B is 144 GB fp16 and needs tp=4 on A100 80 GB to run at
#   all. The standard full-matrix configs run on nice-project gpu:1
#   (48 GB L40s) where the runner skips the 72B scorer with
#   "required GPUs exceeds placement group size". This config isolates
#   the 72B variants so the expensive a100 gpu:4 slot only holds one
#   scorer per job, and lets us defer the run until queue depth allows.
#
# Recommended execution (the ONLY supported partition/gres combo):
#   scripts/submit.sh configs/runs/surrey_legal_tower72b.yaml \
#       -p a100 --gres=gpu:4 --mem=256G --time=12:00:00
#
# Fairshare note: a100 is ~2.2× weight of 3090 and gpu:4 is a heavy ask.
# Submit only when the nice-project full-matrix run (minus the 72B) has
# already landed, and after checking `squeue -p a100` for queue depth.
#
# Output convention: writes to outputs/surrey_legal_tower72b_<ts>/, so
# `mt-metrix tabulate` merges it into the Legal domain row automatically
# alongside outputs/surrey_legal_full_matrix_<ts>/ when pointed at both.
#
# Duplicate this file for the other three domains if 72B numbers are
# wanted everywhere — just swap the dataset include:
#   - configs/runs/surrey_general_tower72b.yaml
#   - configs/runs/surrey_health_tower72b.yaml
#   - configs/runs/surrey_tourism_tower72b.yaml

run:
  id: surrey_legal_tower72b

dataset: !include ../datasets/surrey_legal.yaml

scorers:
  # Tower-Plus-72B — GEMBA-DA prompt (single-float score).
  - ref: tower/tower-plus-72b
  # Tower-Plus-72B — GEMBA-MQM prompt (error-span / MQM-weighted).
  - ref: tower/tower-plus-72b-mqm

output:
  root: outputs
  formats: [tsv, jsonl, summary]
