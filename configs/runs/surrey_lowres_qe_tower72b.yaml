# Surrey Low-resource-QE-DA — Tower-Plus-72B-only follow-up.
#
# Why a separate config:
#   Tower-Plus-72B is 144 GB fp16 and needs tp=4 on A100 80 GB to run
#   at all. The standard surrey_lowres_qe_full_matrix.yaml runs on
#   nice-project gpu:1 (48 GB L40s) where the runner skips the 72B
#   scorer with "required GPUs exceeds placement group size". This
#   config isolates the 72B variants (DA + MQM) so the expensive a100
#   gpu:4 slot only holds these two scorers per job.
#
# Dataset coverage: multilingual subset, 8 low-resource pairs
# (engu / enhi / enmr / enta / ente / eten / neen / sien), ~7.7k rows.
# The `lang_pair` column carries through so mt-metrix tabulate can
# pivot per pair.
#
# Recommended execution:
#   scripts/submit.sh configs/runs/surrey_lowres_qe_tower72b.yaml \
#       -p a100 --gres=gpu:4 --mem=256G --time=16:00:00
#
# Volume note: 8 pairs × ~960 rows average (~7.7k total) is ~3× the
# Legal 72B job. Budget 12–16 h wall-time; the runner persists
# segments.tsv + summary.json after EACH scorer, so a mid-run OOM
# on 72b-mqm (say) still leaves the 72b-DA pass complete on disk.
#
# Fairshare note: a100 is ~2.2× weight of 3090 and gpu:4 is a heavy
# ask. Submit this only after the nice-project
# surrey_lowres_qe_full_matrix.yaml run (minus the 72B) has landed,
# and after checking `squeue -p a100` for queue depth.
#
# Output lands at outputs/surrey_lowres_qe_tower72b_<ts>/. mt-metrix
# tabulate merges it into the lowres_qe row alongside
# outputs/surrey_lowres_qe_full_matrix_<ts>/ when pointed at both.

run:
  id: surrey_lowres_qe_tower72b

dataset: !include ../datasets/surrey_lowres_qe.yaml

scorers:
  # Tower-Plus-72B — GEMBA-DA prompt (single-float score).
  - ref: tower/tower-plus-72b
  # Tower-Plus-72B — GEMBA-MQM prompt (error-span / MQM-weighted).
  - ref: tower/tower-plus-72b-mqm

output:
  root: outputs
  formats: [tsv, jsonl, summary]
